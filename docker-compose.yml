services:

  # ── SQL Server ──────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: persontrack-db
    environment:
      SA_PASSWORD: "PersonTrack_SA_2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - persontrack-net
    restart: unless-stopped
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U SA -P "PersonTrack_SA_2024!"
        -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Backend API ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/PersonTrack.API
      dockerfile: Dockerfile
    container_name: persontrack-api
    environment:
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver;Database=PersonTrackDb;
        User Id=sa;Password=PersonTrack_SA_2024!;
        TrustServerCertificate=True;
      JwtSettings__SecretKey: "PersonTrack_SuperSecretKey_2024_Change_In_Production!"
      JwtSettings__Issuer: "PersonTrackAPI"
      JwtSettings__Audience: "PersonTrackClient"
      JwtSettings__ExpirationHours: "24"
      AdminSeed__Username: "admin"
      AdminSeed__Email: "admin@persontrack.local"
      AdminSeed__Password: "Admin123!"
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      EmailSettings__Host: "smtp-mail.outlook.com"
      EmailSettings__Port: "587"
      EmailSettings__Username: "dogu_rog@hotmail.com"
      EmailSettings__Password: ""
      EmailSettings__DisplayName: "PersonTrack Bildirim"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - persontrack-net
    restart: unless-stopped
    # Backend is internal-only — not exposed directly to host
    expose:
      - "8080"

  # ── Frontend (nginx + SPA + /api proxy) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    container_name: persontrack-web
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - persontrack-net
    restart: unless-stopped

networks:
  persontrack-net:
    driver: bridge

volumes:
  sqldata:
