server {
    listen 80;
    server_name _;
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────
    # Reduces JS/CSS bundle transfer size by ~65–70%
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"            always;
    add_header X-Frame-Options         "SAMEORIGIN"         always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── index.html — never cache ──────────────────────────────────
    # Stale index.html pointing to old hashed bundle = blank page
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma        "no-cache";
        expires -1;
    }

    # ── Hashed static assets — cache forever ─────────────────────
    # Vite injects content hashes into filenames on every build
    location ~* \.(js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Backend health endpoint ───────────────────────────────────
    location ~* ^/health(/.*)?$ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        access_log         off;
    }

    # ── SignalR WebSocket proxy ───────────────────────────────────
    location /hubs/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Long timeouts for persistent WS connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;

        # Disable response buffering for real-time messages
        proxy_cache         off;
    }

    # ── REST API proxy ────────────────────────────────────────────
    location /api {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Allow file uploads (photos, imports)
        client_max_body_size  25M;

        # Buffer responses for faster delivery
        proxy_buffering         on;
        proxy_buffer_size       4k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }

    # ── SPA fallback — all unknown paths → index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
